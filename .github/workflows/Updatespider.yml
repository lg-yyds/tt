name: Update Spider Value

on:
  schedule:
    - cron: '0 03 * * *'          # 每天 UTC 03:00 触发（北京时间 11:00）
  workflow_dispatch:              # 支持手动触发

permissions:
  contents: write                 # 必须：允许 push 变更（解决 git exit 128）

jobs:
  update-spider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main                   # 替换成你的实际分支（如 master）
          fetch-depth: 0              # 完整历史，避免 push 问题

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract spider value from lem.json
        id: extract-spider
        run: |
          SPIDER_VALUE=$(jq -r '.spider' ./JN/lem.json)
          echo "Extracted spider value: $SPIDER_VALUE"
          echo "spider_value=$SPIDER_VALUE" >> $GITHUB_OUTPUT

      - name: Update spider value in tv.json
        run: |
          SPIDER_VALUE="${{ steps.extract-spider.outputs.spider_value }}"
          
          # 使用 jq 直接替换（最安全方式，避免 sed 转义地狱）
          jq --arg newval "$SPIDER_VALUE" \
             '.spider = $newval' \
             ./JN/tv.json > ./JN/tv.json.tmp && \
             mv ./JN/tv.json.tmp ./JN/tv.json
          
          echo "Updated tv.json:"
          cat ./JN/tv.json

      - name: Update spider value in tvy.json
        run: |
          SPIDER_VALUE="${{ steps.extract-spider.outputs.spider_value }}"
          
          jq --arg newval "$SPIDER_VALUE" \
             '.spider = $newval' \
             ./JN/tvy.json > ./JN/tvy.json.tmp && \
             mv ./JN/tvy.json.tmp ./JN/tvy.json
          
          echo "Updated tvy.json:"
          cat ./JN/tvy.json

      - name: Update spider value in ttt.json
        run: |
          SPIDER_VALUE="${{ steps.extract-spider.outputs.spider_value }}"
          
          jq --arg newval "$SPIDER_VALUE" \
             '.spider = $newval' \
             ./JN/ttt.json > ./JN/ttt.json.tmp && \
             mv ./JN/ttt.json.tmp ./JN/ttt.json
          
          echo "Updated ttt.json:"
          cat ./JN/ttt.json

      - name: Check for changes
        id: check-changes
        run: |
          git status --short
          if git diff --quiet HEAD -- ./JN/*.json; then
            echo "No changes detected."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ./JN/tv.json ./JN/tvy.json ./JN/ttt.json
          git commit -m "chore: update spider value ($(date +'%Y-%m-%d %H:%M UTC'))" || echo "Commit skipped (no changes)"
          git push origin HEAD:main
