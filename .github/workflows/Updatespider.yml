name: Update Spider Value

on:
  schedule:
    - cron: '0 03 * * *'          # 每天 UTC 03:00 触发（北京时间 11:00，可调整）
  workflow_dispatch:              # 支持手动触发测试

permissions:
  contents: write                 # 关键！允许 push 回仓库（解决 exit code 128）

jobs:
  update-spider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4    # 升级到 v4
        with:
          ref: main                   # 替换成你的实际默认分支（如 master）
          fetch-depth: 0              # 获取完整历史，避免 shallow clone 问题

      - name: Extract spider value from lem.json
        id: extract-spider
        run: |
          # 推荐使用 jq 解析 JSON（更可靠，防止值里有特殊字符导致 grep 错）
          # 如果没有 jq，可先安装：sudo apt-get update && sudo apt-get install -y jq
          SPIDER_VALUE=$(jq -r '.spider' ./JN/lem.json)
          
          # 如果你坚持用 grep（不推荐），保持原样：
          # SPIDER_VALUE=$(grep -oP '(?<="spider":")[^"]*' ./JN/lem.json | head -n 1)
          
          echo "Extracted spider value: $SPIDER_VALUE"
          echo "spider_value=$SPIDER_VALUE" >> $GITHUB_OUTPUT   # 新写法

      - name: Update spider value in tv.json
        run: |
          SPIDER_VALUE="${{ steps.extract-spider.outputs.spider_value }}"
          # 转义特殊字符（/ & " 等），防止 sed 语法错误
          ESCAPED_SPIDER_VALUE=$(printf '%s' "$SPIDER_VALUE" | sed 's/[[\.*^$/]/\\&/g; s/"/\\"/g')
          sed -i '0,/"spider":".*"/s//"spider":"'"$ESCAPED_SPIDER_VALUE"'"/' ./JN/tv.json
          echo "Updated tv.json:"
          cat ./JN/tv.json

      - name: Update spider value in tvy.json
        run: |
          SPIDER_VALUE="${{ steps.extract-spider.outputs.spider_value }}"
          ESCAPED_SPIDER_VALUE=$(printf '%s' "$SPIDER_VALUE" | sed 's/[[\.*^$/]/\\&/g; s/"/\\"/g')
          sed -i '0,/"spider":".*"/s//"spider":"'"$ESCAPED_SPIDER_VALUE"'"/' ./JN/tvy.json
          echo "Updated tvy.json:"
          cat ./JN/tvy.json

      - name: Update spider value in ttt.json
        run: |
          SPIDER_VALUE="${{ steps.extract-spider.outputs.spider_value }}"
          ESCAPED_SPIDER_VALUE=$(printf '%s' "$SPIDER_VALUE" | sed 's/[[\.*^$/]/\\&/g; s/"/\\"/g')
          sed -i '0,/"spider":".*"/s//"spider":"'"$ESCAPED_SPIDER_VALUE"'"/' ./JN/ttt.json
          echo "Updated ttt.json:"
          cat ./JN/ttt.json

      - name: Check for changes
        id: check-changes
        run: |
          git status --short
          if git diff --quiet HEAD -- ./JN/*.json; then
            echo "No changes to commit."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ./JN/tv.json ./JN/tvy.json ./JN/ttt.json
          git commit -m "chore: update spider value ($(date +'%Y-%m-%d %H:%M UTC'))"
          git push origin HEAD:main     # 或你的分支名
